<svg width="1584" height="396" viewBox="0 0 1584 396" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Google Fonts (loads when opened in a browser) -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&amp;family=Inter:wght@400;500&amp;display=swap');
    </style>

    <!-- Dot grid -->
    <pattern id="dotGrid" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="18" r="1" fill="white" fill-opacity="0.045"/>
    </pattern>

    <!-- Logo gradients (userSpaceOnUse — coords are local to the group that uses them) -->
    <linearGradient id="lg1" x1="34" y1="34" x2="94" y2="76" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4F7FB"/>
      <stop offset="0.45" stop-color="#C9D3E2"/>
      <stop offset="1" stop-color="#8A97AB"/>
    </linearGradient>
    <linearGradient id="lg2" x1="34" y1="34" x2="94" y2="92" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DCE4F0" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#7B879A" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Tagline gradient (second line fades to steel-blue) -->
    <linearGradient id="tagGrad" x1="530" y1="0" x2="1140" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#E0E8F4"/>
      <stop offset="1" stop-color="#A7B4C8"/>
    </linearGradient>

    <!-- Vertical divider gradient (fades at top and bottom) -->
    <linearGradient id="divV" x1="0" y1="96" x2="0" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0"/>
      <stop offset="0.25" stop-color="white" stop-opacity="0.13"/>
      <stop offset="0.75" stop-color="white" stop-opacity="0.13"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Ambient center glow -->
    <radialGradient id="bgGlow" cx="40%" cy="50%" r="55%" gradientUnits="userSpaceOnUse"
                    fx="650" fy="198">
      <stop stop-color="#0d1622" stop-opacity="1"/>
      <stop offset="1" stop-color="#0a0a0b" stop-opacity="0"/>
    </radialGradient>

    <!-- Right ambient glow -->
    <radialGradient id="bgGlow2" cx="85%" cy="50%" r="40%" gradientUnits="userSpaceOnUse"
                    fx="1350" fy="198">
      <stop stop-color="#0c1420" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#0a0a0b" stop-opacity="0"/>
    </radialGradient>

    <!-- Decorative arc gradient (faint background) -->
    <linearGradient id="decArc" x1="1100" y1="80" x2="1560" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.055"/>
      <stop offset="1" stop-color="white" stop-opacity="0.01"/>
    </linearGradient>
  </defs>

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="1584" height="396" fill="#0a0a0b"/>
  <ellipse cx="650" cy="198" rx="750" ry="260" fill="url(#bgGlow)"/>
  <ellipse cx="1350" cy="198" rx="500" ry="220" fill="url(#bgGlow2)"/>
  <rect width="1584" height="396" fill="url(#dotGrid)"/>

  <!-- Decorative large arcs (ghost of the Kalman mark) -->
  <path d="M1120 60 C1120 -80 1360 -120 1560 -80 H1580"
        stroke="url(#decArc)" stroke-width="72" stroke-linecap="round" fill="none"/>
  <path d="M1580 -80 C1580 80 1380 220 1150 240 H1100"
        stroke="url(#decArc)" stroke-width="72" stroke-linecap="round" fill="none"/>
  <path d="M1100 80 H1160 C1380 80 1570 260 1570 460 V480"
        stroke="white" stroke-opacity="0.025" stroke-width="44" stroke-linecap="round" fill="none"/>

  <!-- Bottom edge accent line -->
  <rect x="0" y="392" width="1584" height="4" fill="white" fill-opacity="0.04"/>

  <!-- ═══ LEFT SECTION: BRAND ═══ -->
  <!-- Logo 128×128, vertically centered: y=(396-128)/2=134 -->
  <g transform="translate(72, 134)">
    <rect x="8" y="8" width="112" height="112" rx="28" fill="#0F1218"/>
    <rect x="8.75" y="8.75" width="110.5" height="110.5" rx="27.25"
          stroke="white" stroke-opacity="0.08" stroke-width="1.5"/>
    <path d="M34 76C34 52.804 52.804 34 76 34H86"
          stroke="url(#lg1)" stroke-width="8" stroke-linecap="round"/>
    <path d="M94 34C94 57.196 75.196 76 52 76H42"
          stroke="url(#lg1)" stroke-width="8" stroke-linecap="round"/>
    <path d="M34 92H48C73.4051 92 94 71.4051 94 46V34"
          stroke="url(#lg2)" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="34" cy="76" r="5" fill="#E8EEF8"/>
    <circle cx="94" cy="34" r="5" fill="#E8EEF8"/>
    <circle cx="34" cy="92" r="4" fill="#A7B4C8" fill-opacity="0.85"/>
  </g>

  <!-- Brand wordmark (right of logo) -->
  <!-- Logo spans x=72–200, center y=198 -->
  <text x="220" y="190"
        font-family="Syne, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="25" font-weight="700" fill="white" letter-spacing="4">KALMAN LABS</text>
  <text x="221" y="214"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="12.5" font-weight="400" fill="rgba(255,255,255,0.38)" letter-spacing="0.5">kalman-labs.com</text>

  <!-- ═══ DIVIDER 1 ═══ -->
  <rect x="476" y="96" width="1" height="204" fill="url(#divV)"/>

  <!-- ═══ CENTER SECTION: TAGLINE ═══ -->
  <!--
    Two lines of 46px text.
    Vertical span: cap top ~141, descender ~245 → center ≈ 193 ≈ 198 ✓
  -->
  <text x="524" y="179"
        font-family="Syne, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="46" font-weight="700" fill="white">Complex AI systems,</text>
  <text x="524" y="238"
        font-family="Syne, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="46" font-weight="700" fill="url(#tagGrad)">shipped to production.</text>

  <!-- Subtitle row -->
  <text x="524" y="272"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13" font-weight="400" fill="rgba(255,255,255,0.38)" letter-spacing="0.35">
    Research-backed engineering · Multi-agent · RAG pipelines · Biomarker AI · Legal AI
  </text>

  <!-- ═══ DIVIDER 2 ═══ -->
  <rect x="1140" y="96" width="1" height="204" fill="url(#divV)"/>

  <!-- ═══ RIGHT SECTION: STATS (2 × 2 grid) ═══ -->
  <!--
    Col 1: x=1162  |  Col 2: x=1350
    Row 1: numbers y=179, labels y=200
    Row 2: numbers y=265, labels y=286
  -->

  <!-- Stat 1 — 45K+ -->
  <text x="1162" y="179"
        font-family="Syne, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="38" font-weight="700" fill="white">45K+</text>
  <text x="1162" y="199"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" font-weight="400" fill="rgba(255,255,255,0.42)" letter-spacing="0.5">Minutes AI-Processed</text>

  <!-- Stat 2 — 8+ -->
  <text x="1352" y="179"
        font-family="Syne, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="38" font-weight="700" fill="white">8+</text>
  <text x="1352" y="199"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" font-weight="400" fill="rgba(255,255,255,0.42)" letter-spacing="0.5">AI Systems Shipped</text>

  <!-- Stat 3 — 6+ -->
  <text x="1162" y="265"
        font-family="Syne, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="38" font-weight="700" fill="white">6+</text>
  <text x="1162" y="285"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" font-weight="400" fill="rgba(255,255,255,0.42)" letter-spacing="0.5">Enterprise Clients</text>

  <!-- Stat 4 — 6 -->
  <text x="1352" y="265"
        font-family="Syne, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="38" font-weight="700" fill="white">6</text>
  <text x="1352" y="285"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" font-weight="400" fill="rgba(255,255,255,0.42)" letter-spacing="0.5">Published Papers</text>

</svg>
